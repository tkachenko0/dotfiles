general:
  config_reload_commands: []

  focus_follows_cursor: false
  toggle_workspace_on_refocus: false

  cursor_jump:
    enabled: true
    # 'monitor_focus' | 'window_focus'
    trigger: "monitor_focus"

  # 'cloak' (Windows, recommended) | 'hide' (Windows legacy, has app stability issues)
  # | 'place_in_corner' (macOS / fallback)
  hide_method: "cloak"

  # When false, the taskbar shows only windows of currently visible workspaces.
  show_all_in_taskbar: false

gaps:
  scale_with_dpi: true
  inner_gap: "0px"
  outer_gap:
    top: "0px"
    right: "0px"
    bottom: "0px"
    left: "0px"

window_effects:
  focused_window:
    # Border requires Windows 11.
    border:
      enabled: false
      color: "#8dbcff"
    hide_title_bar:
      enabled: false
    corner_style:
      enabled: false
      style: "square"
    transparency:
      enabled: false
      opacity: "97%"

  other_windows:
    border:
      enabled: true
      color: "#a1a1a1"
    hide_title_bar:
      enabled: false
    corner_style:
      enabled: false
      style: "square"
    # Keep opacity > 0% — at 0% windows become unfocusable if transparency is enabled.
    transparency:
      enabled: false
      opacity: "95%"

window_behavior:
  # Default to floating; tile explicitly with alt+t when needed.
  initial_state: "floating"

  state_defaults:
    floating:
      centered: true
      shown_on_top: false
    fullscreen:
      maximized: false
      shown_on_top: false

workspaces:
  - name: "1"
    keep_alive: true
    bind_to_monitor: 0
  - name: "2"
    keep_alive: true
    bind_to_monitor: 0
  - name: "3"
    keep_alive: true
    bind_to_monitor: 0
  - name: "4"
    keep_alive: true
    bind_to_monitor: 0
  - name: "laptop"
    keep_alive: true
    bind_to_monitor: 1

window_rules:
  - commands: ["ignore"]
    match:
      # Browser picture-in-picture popups.
      - window_title: { regex: "[Pp]icture.in.[Pp]icture" }
        window_class: { regex: "Chrome_WidgetWin_1|MozillaDialogClass" }
      # PowerToys / Lively overlays.
      - window_process: { equals: "PowerToys" }
        window_class: { regex: 'HwndWrapper\[PowerToys\.PowerAccent.*?\]' }
      - window_process: { equals: "PowerToys" }
        window_title: { regex: ".*? - Peek" }
      - window_process: { equals: "Lively" }
        window_class: { regex: "HwndWrapper" }

binding_modes:
  # Resize the focused window via HJKL / arrow keys; escape or enter to exit.
  - name: "resize"
    keybindings:
      - commands: ["resize --width -2%"]
        bindings: ["h", "left"]
      - commands: ["resize --width +2%"]
        bindings: ["l", "right"]
      - commands: ["resize --height +2%"]
        bindings: ["k", "up"]
      - commands: ["resize --height -2%"]
        bindings: ["j", "down"]
      - commands: ["wm-disable-binding-mode --name resize"]
        bindings: ["escape", "enter"]

keybindings:
  # Focus workspace.
  - commands: ["focus --workspace 1"]
    bindings: ["alt+1"]
  - commands: ["focus --workspace 2"]
    bindings: ["alt+2"]
  - commands: ["focus --workspace 3"]
    bindings: ["alt+3"]
  - commands: ["focus --workspace 4"]
    bindings: ["alt+4"]
  - commands: ["focus --workspace laptop"]
    bindings: ["alt+0"]

  # Move the focused workspace to the monitor on the left.
  - commands: ["move-workspace --direction left"]
    bindings: ["alt+shift+a"]

  # Move focused window to workspace and follow it.
  - commands: ["move --workspace 1", "focus --workspace 1"]
    bindings: ["alt+shift+1"]
  - commands: ["move --workspace 2", "focus --workspace 2"]
    bindings: ["alt+shift+2"]
  - commands: ["move --workspace 3", "focus --workspace 3"]
    bindings: ["alt+shift+3"]
  - commands: ["move --workspace 4", "focus --workspace 4"]
    bindings: ["alt+shift+4"]
  - commands: ["move --workspace laptop", "focus --workspace laptop"]
    bindings: ["alt+shift+0"]
